name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin actions to immutable SHA for supply‑chain safety (example SHAs shown).
# Replace the placeholder SHAs with the actual commit IDs when copying.
permissions:
  contents: read        # read‑only default, no write access
  issues: read
  pull-requests: read
  packages: read
  # No write permissions; specific jobs that need write will request it explicitly.

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@5a0c3e9c6e4fbbda2baaf0c6b5e1d2c5a4e9b7d8  # pinned SHA

      - name: Set up Python
        uses: actions/setup-python@6c2e1d395b8a5e3a218aedc3ffaf9b5c9651e3d6  # pinned SHA
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q

  secret‑scan:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@5a0c3e9c6e4fbbda2baaf0c6b5e1d2c5a4e9b7d8
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@a2d9f7c94f5e6c9b1e7d4a2f3b6c8d9e0f1a2b3c  # pinned SHA
        with:
          extra_args: "--only-verified"

  code‑scan:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@5a0c3e9c6e4fbbda2baaf0c6b5e1d2c5a4e9b7d8
      - name: CodeQL analysis (default config)
        uses: github/codeql-action/analyze@e7c5d3a2c4b9d8f6a7e9c1b3d2f5a4c6e8b9d0f  # pinned SHA
        with:
          # limited to read‑only, no upload of results to external services
          upload: false

# Concurrency cancels stale runs on the same branch to keep CI fast.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true